<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    <h1>Registro de Entradas y Salidas</h1>
    <button id="registroEntrada">Registrar Entrada</button>
    <button id="registroSalida">Registrar Salida</button>

    <div id="mensaje" style="color: red;"></div>

    <script>
        document.getElementById('registroEntrada').onclick = async () => {
            const tipo = 'entrada';
            const userId = 'ID_DEL_USUARIO'; // Asegúrate de reemplazar esto con el ID del usuario real
            const ubicacion = { lat: 0, lng: 0 }; // Aquí deberías obtener la ubicación en tiempo real

            try {
                const response = await fetch(`/api/registro/${tipo}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId, ubicacion }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    console.error('Error:', data.msg); // Mensaje de error en la consola
                    document.getElementById('mensaje').textContent = `Error: ${data.msg}`; // Mostrar en la interfaz
                    return; // Terminar la función si hay un error
                }

                const data = await response.json();
                console.log(data.msg); // Mensaje de éxito en la consola
                document.getElementById('mensaje').textContent = data.msg; // Mostrar en la interfaz

            } catch (error) {
                console.error('Error al registrar la entrada:', error); // Error de la solicitud
                document.getElementById('mensaje').textContent = `Error al registrar la entrada: ${error.message}`; // Mostrar en la interfaz
            }
        };

        document.getElementById('registroSalida').onclick = async () => {
            const tipo = 'salida';
            const userId = 'ID_DEL_USUARIO'; // Asegúrate de reemplazar esto con el ID del usuario real
            const ubicacion = { lat: 0, lng: 0 }; // Aquí deberías obtener la ubicación en tiempo real

            try {
                const response = await fetch(`/api/registro/${tipo}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId, ubicacion }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    console.error('Error:', data.msg); // Mensaje de error en la consola
                    document.getElementById('mensaje').textContent = `Error: ${data.msg}`; // Mostrar en la interfaz
                    return; // Terminar la función si hay un error
                }

                const data = await response.json();
                console.log(data.msg); // Mensaje de éxito en la consola
                document.getElementById('mensaje').textContent = data.msg; // Mostrar en la interfaz

            } catch (error) {
                console.error('Error al registrar la salida:', error); // Error de la solicitud
                document.getElementById('mensaje').textContent = `Error al registrar la salida: ${error.message}`; // Mostrar en la interfaz
            }
        };
    </script>
</body>
</html>
