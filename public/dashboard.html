<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center" id="welcomeMessage">¡Bienvenido!</h2>
        <div class="text-center">
            <button id="registerEntry" class="btn btn-success mt-3">Registro de entrada</button>
            <button id="registerExit" class="btn btn-danger mt-3">Registro de salida</button>
            <button id="logoutButton" class="btn btn-secondary mt-3">Cerrar sesión</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            } else {
                const welcomeMessage = document.getElementById('welcomeMessage');
                welcomeMessage.innerHTML = '¡Hola, usuario!';
            }
        });

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });

        // Lógica para registrar entrada
        document.getElementById('registerEntry').addEventListener('click', () => {
            registrarMovimiento('entrada');
        });

        // Lógica para registrar salida
        document.getElementById('registerExit').addEventListener('click', () => {
            registrarMovimiento('salida');
        });

        async function registrarMovimiento(tipo) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    const timestamp = new Date().toISOString();
                    const token = localStorage.getItem('token');
                    const userId = ''; // Obtén el userId del token o de otra manera
                    const deviceID = localStorage.getItem('deviceID');

                    const registroData = {
                        userId,
                        tipo,
                        ubicacion: {
                            lat: latitude,
                            lng: longitude,
                        },
                        fecha: timestamp,
                    };

                    try {
                        const response = await fetch(`/api/registro/${tipo}`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`, // Agrega el token en el encabezado
                            },
                            body: JSON.stringify(registroData),
                        });

                        const data = await response.json();
                        if (response.ok) {
                            alert(data.msg);
                        } else {
                            alert(data.msg);
                        }
                    } catch (error) {
                        console.error('Error al registrar movimiento:', error);
                        alert('Error al registrar movimiento.');
                    }
                }, (error) => {
                    console.error('Error al obtener ubicación:', error);
                    alert('No se pudo obtener la ubicación.');
                });
            } else {
                alert('La geolocalización no es soportada por este navegador.');
            }
        }
    </script>
</body>
</html>
