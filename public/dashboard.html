<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .btn {
            margin: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center">Registro de Entrada y Salida</h1>
    <div class="text-center">
        <button id="registroEntrada" class="btn btn-success">Registro de Entrada</button>
        <button id="registroSalida" class="btn btn-danger">Registro de Salida</button>
    </div>
    <div id="mensaje" class="text-center mt-3"></div>
</div>

<script>
    // Función para registrar entrada
    document.getElementById('registroEntrada').onclick = async () => {
        const userId = 'ID_DEL_USUARIO'; // Cambia esto por el ID del usuario real
        navigator.geolocation.getCurrentPosition(async (position) => {
            const ubicacion = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
            };

            try {
                const response = await fetch(`/api/registro/entrada`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId, ubicacion }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    console.error('Error:', data.msg);
                    alert(`Error: ${data.msg}`);
                    return;
                }

                const data = await response.json();
                console.log(data.msg);
                alert(data.msg);

            } catch (error) {
                console.error('Error al registrar la entrada:', error);
                alert(`Error al registrar la entrada: ${error.message}`);
            }
        }, (error) => {
            console.error('Error de geolocalización:', error);
            alert('No se pudo obtener la ubicación.');
        });
    };

    // Función para registrar salida
    document.getElementById('registroSalida').onclick = async () => {
        const userId = 'ID_DEL_USUARIO'; // Cambia esto por el ID del usuario real
        navigator.geolocation.getCurrentPosition(async (position) => {
            const ubicacion = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
            };

            try {
                const response = await fetch(`/api/registro/salida`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId, ubicacion }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    console.error('Error:', data.msg);
                    alert(`Error: ${data.msg}`);
                    return;
                }

                const data = await response.json();
                console.log(data.msg);
                alert(data.msg);

            } catch (error) {
                console.error('Error al registrar la salida:', error);
                alert(`Error al registrar la salida: ${error.message}`);
            }
        }, (error) => {
            console.error('Error de geolocalización:', error);
            alert('No se pudo obtener la ubicación.');
        });
    };
</script>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
