<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script>
        // Función para obtener la ubicación
        const getLocation = () => {
            return new Promise((resolve, reject) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                } else {
                    reject('Geolocalización no es soportada por este navegador.');
                }
            });
        };

        // Función para registrar la entrada
        const registroEntrada = async () => {
            try {
                const position = await getLocation();
                const ubicacion = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                };
                const userId = 'ID_DEL_USUARIO'; // Reemplaza con el ID real del usuario

                const response = await fetch('/api/registro/entrada', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId, ubicacion }),
                });

                const data = await response.json();
                if (response.ok) {
                    alert(data.msg); // Mensaje de éxito
                } else {
                    console.error('Error:', data.msg); // Mensaje de error
                    alert('Error al registrar entrada: ' + data.msg);
                }
            } catch (error) {
                console.error('Error al obtener ubicación:', error);
                alert('Error al obtener ubicación: ' + error);
            }
        };

        // Función para registrar la salida
        const registroSalida = async () => {
            try {
                const position = await getLocation();
                const ubicacion = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                };
                const userId = 'ID_DEL_USUARIO'; // Reemplaza con el ID real del usuario

                const response = await fetch('/api/registro/salida', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId, ubicacion }),
                });

                const data = await response.json();
                if (response.ok) {
                    alert(data.msg); // Mensaje de éxito
                } else {
                    console.error('Error:', data.msg); // Mensaje de error
                    alert('Error al registrar salida: ' + data.msg);
                }
            } catch (error) {
                console.error('Error al obtener ubicación:', error);
                alert('Error al obtener ubicación: ' + error);
            }
        };
    </script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Dashboard</h1>
        <button class="btn btn-success mt-3" onclick="registroEntrada()">Registrar Entrada</button>
        <button class="btn btn-danger mt-3" onclick="registroSalida()">Registrar Salida</button>
    </div>
</body>
</html>
